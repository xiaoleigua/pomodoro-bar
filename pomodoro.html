<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f0e8;
    --surface:   #ede6da;
    --text:      #2c2416;
    --text-dim:  #8c8070;
    --accent:    #c75b4a;
    --accent-soft: #e0a892;
    --ring-bg:   #dbd2c2;
    --ring-fg:   #c75b4a;
    --shadow:    0 2px 24px rgba(44, 36, 22, 0.06);
    --radius:    16px;
    --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
    --font-mono:    'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-display);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    transition: background 0.8s ease, color 0.8s ease;
    position: relative;
    overflow: hidden;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    pointer-events: none; z-index: 0;
  }

  body.break {
    --bg: #edebe4;
    --surface: #e4e1d8;
    --accent: #7a9a7e;
    --accent-soft: #b8ccb5;
    --ring-fg: #7a9a7e;
    --ring-bg: #d5d3c8;
  }
  body.long-break {
    --bg: #e8e5de;
    --surface: #dedbd2;
    --accent: #8b7d6b;
    --accent-soft: #c4b8a8;
    --ring-fg: #8b7d6b;
    --ring-bg: #d0ccc2;
  }

  .container {
    position: relative; z-index: 1;
    text-align: center;
    max-width: 420px; width: 92%;
    padding: 48px 0;
  }

  /* ── Title ───────────────────── */
  h1 {
    font-family: var(--font-display);
    font-size: 1.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 36px;
    opacity: 0.85;
  }

  /* ── Mode Tabs ──────────────── */
  .mode-tabs {
    display: flex; gap: 4px; margin-bottom: 36px;
    background: var(--surface); border-radius: 14px; padding: 5px;
    box-shadow: var(--shadow);
  }
  .mode-tab {
    flex: 1; padding: 10px 0; border: none; border-radius: 11px;
    background: transparent; color: var(--text-dim);
    font-family: var(--font-display); font-size: 0.9rem;
    cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .mode-tab.active {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 18px rgba(199, 91, 74, 0.25);
  }
  .mode-tab:not(.active):hover { color: var(--text); }

  /* ── Timer Ring ─────────────── */
  .timer-ring {
    position: relative;
    width: 280px; height: 280px;
    margin: 0 auto 40px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 280px; height: 280px;
    filter: drop-shadow(0 8px 32px rgba(44, 36, 22, 0.06));
  }
  .ring-bg {
    fill: none; stroke: var(--ring-bg);
    stroke-width: 8; stroke-linecap: round;
  }
  .ring-fg {
    fill: none; stroke: var(--ring-fg);
    stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.8s ease;
  }

  .time-display {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .time-text {
    font-family: var(--font-mono);
    font-size: 4.2rem; font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    color: var(--text);
    transition: color 0.8s ease;
  }
  .time-text.idle {
    opacity: 0.6;
  }
  .session-label {
    font-family: var(--font-display);
    font-size: 0.85rem; color: var(--text-dim);
    margin-top: 6px; letter-spacing: 0.1em;
    transition: color 0.8s ease;
  }

  /* ── Buttons ────────────────── */
  .controls {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 32px;
  }
  .btn {
    padding: 14px 36px; border: none; border-radius: 30px;
    font-family: var(--font-display); font-size: 1.05rem; font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; overflow: hidden;
  }
  .btn-start {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 22px rgba(199, 91, 74, 0.25);
  }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(199, 91, 74, 0.35);
  }
  .btn-start:active { transform: translateY(0); }
  .btn-reset {
    background: transparent; color: var(--text-dim);
    border: 1.5px solid var(--ring-bg);
  }
  .btn-reset:hover {
    color: var(--text); border-color: var(--text-dim);
  }

  /* ── Stats ──────────────────── */
  .stats {
    font-family: var(--font-display);
    color: var(--text-dim); font-size: 0.85rem;
    letter-spacing: 0.06em;
  }
  .stats span {
    color: var(--accent); font-family: var(--font-mono);
    font-size: 1.1rem; font-weight: 500;
  }

  /* ── Footer ─────────────────── */
  .footer {
    margin-top: 44px; color: var(--text-dim);
    font-size: 0.72rem; letter-spacing: 0.08em;
    opacity: 0.6;
  }

  /* ── Breathing idle pulse ───── */
  @keyframes breathe {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 0.80; }
  }
  .timer-ring.idle svg .ring-fg {
    animation: breathe 3s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="container">
  <h1>番 茄 钟</h1>

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="focus">专注 25</button>
    <button class="mode-tab" data-mode="short">短休 5</button>
    <button class="mode-tab" data-mode="long">长休 15</button>
  </div>

  <div class="timer-ring" id="timerRing">
    <svg viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="128"/>
      <circle class="ring-fg" id="ring" cx="140" cy="140" r="128"
              stroke-dasharray="804.25" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time-text idle" id="time">25:00</div>
      <div class="session-label" id="label">准备开始</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn">开 始</button>
    <button class="btn btn-reset" id="resetBtn">重 置</button>
  </div>

  <div class="stats">
    今日完成 <span id="count">0</span> 个番茄
  </div>

  <div class="footer">专注 25 分钟  ·  短休 5 分钟  ·  长休 15 分钟</div>
</div>

<script>
  const MODES = {
    focus: { label: '专注中', minutes: 25, next: 'short', bodyClass: '' },
    short: { label: '短休中', minutes:  5, next: 'focus', bodyClass: 'break' },
    long:  { label: '长休中', minutes: 15, next: 'focus', bodyClass: 'long-break' },
  };

  let currentMode = 'focus';
  let remaining  = MODES.focus.minutes * 60;
  let total      = remaining;
  let timerId    = null;
  let running    = false;
  let todayCount = 0;

  const $time     = document.getElementById('time');
  const $label    = document.getElementById('label');
  const $ring     = document.getElementById('ring');
  const $start    = document.getElementById('startBtn');
  const $reset    = document.getElementById('resetBtn');
  const $count    = document.getElementById('count');
  const $body     = document.body;
  const $tabs     = document.querySelectorAll('.mode-tab');
  const $timerRing = document.getElementById('timerRing');

  const CIRCUMFERENCE = 2 * Math.PI * 128;

  function fmt(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateUI() {
    $time.textContent  = fmt(remaining);
    $time.classList.toggle('idle', !running);
    $label.textContent = running ? MODES[currentMode].label : '暂停中';
    $timerRing.classList.toggle('idle', !running);

    const progress = total > 0 ? (1 - remaining / total) : 0;
    $ring.style.strokeDashoffset = CIRCUMFERENCE * progress;
  }

  function applyMode(mode) {
    currentMode = mode;
    remaining   = MODES[mode].minutes * 60;
    total       = remaining;
    running     = false;
    timerId && clearInterval(timerId);
    timerId = null;

    $start.textContent = '开 始';
    $ring.style.strokeDashoffset = 0;

    $body.className = MODES[mode].bodyClass;
    $tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    updateUI();
  }

  function onTick() {
    if (remaining <= 0) {
      clearInterval(timerId);
      timerId = null;
      running = false;
      $start.textContent = '开 始';

      if (currentMode === 'focus') {
        todayCount++;
        $count.textContent = todayCount;
      }

      try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACAf39/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+Af39/gH9/f4B/f3+AA==').play(); } catch (_) {}

      applyMode(MODES[currentMode].next);
      return;
    }
    remaining--;
    updateUI();
  }

  $start.onclick = () => {
    if (running) {
      clearInterval(timerId); timerId = null; running = false;
      $start.textContent = '继 续';
      $label.textContent = '暂停中';
      updateUI();
    } else {
      running = true;
      $start.textContent = '暂 停';
      $label.textContent = MODES[currentMode].label;
      $time.classList.remove('idle');
      $timerRing.classList.remove('idle');
      timerId = setInterval(onTick, 1000);
    }
  };

  $reset.onclick = () => applyMode(currentMode);

  $tabs.forEach(tab => {
    tab.onclick = () => {
      if (!running || confirm('切换模式将重置计时，确定吗？')) applyMode(tab.dataset.mode);
    };
  });

  updateUI();
</script>
</body>
</html>
